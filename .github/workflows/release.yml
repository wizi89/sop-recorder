name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install trusted-signing-cli
        run: cargo install trusted-signing-cli

      - name: Generate signing config
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $config = @{
            bundle = @{
              windows = @{
                signCommand = "trusted-signing-cli --azure-client-id $env:AZURE_CLIENT_ID --azure-client-secret $env:AZURE_CLIENT_SECRET --azure-tenant-id $env:AZURE_TENANT_ID -e https://weu.codesigning.azure.net -a signing-sop-sorcery -c sop-recorder-profile -d sop-sorcery %1"
              }
            }
          }
          $config | ConvertTo-Json -Depth 4 | Out-File -FilePath src-tauri/tauri.signing.conf.json -Encoding utf8NoBOM

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.signing.conf.json
