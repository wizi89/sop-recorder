name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Install trusted-signing-cli
        run: cargo install trusted-signing-cli

      - name: Verify signing setup
        shell: pwsh
        run: |
          Write-Host "=== trusted-signing-cli ==="
          Get-Command trusted-signing-cli -ErrorAction SilentlyContinue | Select-Object Source
          trusted-signing-cli --version
          Write-Host "=== signtool.exe ==="
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          Write-Host "Found: $($signtool.FullName)"
          echo "SIGNTOOL_PATH=$($signtool.FullName)" >> $env:GITHUB_ENV
          Write-Host "=== PATH ==="
          $env:PATH -split ';' | Where-Object { $_ -match 'cargo' }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SIGNTOOL_PATH: ${{ env.SIGNTOOL_PATH }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --verbose --config src-tauri/tauri.signing.conf.json
